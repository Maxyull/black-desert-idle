name: CodeQL

# Analyse statique de sécurité (SAST) GitHub — gratuite sur repo public.
# Résultats dans l'onglet Security > Code scanning. Détecte XSS, injections, etc.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '27 4 * * 1' # hebdo (lundi ~4h27), rattrape les nouvelles règles CodeQL

jobs:
  analyze:
    name: Analyze (javascript)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@b7351df727350dca84cb9d725d57dcf5bc82ba26 # v3
        with:
          languages: javascript-typescript
          # security-and-quality inclut plus de règles que le défaut (security-extended possible aussi)
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@b7351df727350dca84cb9d725d57dcf5bc82ba26 # v3
        with:
          category: '/language:javascript-typescript'
